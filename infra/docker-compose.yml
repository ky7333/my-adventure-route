services:
  postgres:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    container_name: adventure_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adventure_route
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d adventure_route']
      interval: 5s
      timeout: 5s
      retries: 10

  graphhopper:
    image: israelhikingmap/graphhopper:latest@sha256:bec29b75649d89f4d21116d7a1500cbd991d3d08c59f33afae0f0af294c54b20
    container_name: adventure_graphhopper
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8989:8989'
    volumes:
      - ./data/graphhopper:/data
      - ./data/osm:/data/osm
    environment:
      JAVA_OPTS: '-Xmx4g -Xms4g -Ddw.graphhopper.graph.encoded_values=road_class,road_environment,max_speed,road_access,surface,car_access,car_average_speed'
    command:
      - '--input'
      - '/data/osm/${OSM_PBF_FILE:-vermont-latest.osm.pbf}'
      - '--graph-cache'
      - '/data/${OSM_GRAPH_CACHE:-adventure-vt-gh}'
      - '--host'
      - '0.0.0.0'
      - '--port'
      - '8989'
    restart: unless-stopped

volumes:
  postgres_data:
