name: Containers

on:
  pull_request:
    paths:
      - '.github/workflows/containers.yml'
      - '.dockerignore'
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: containers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-check:
    if: github.event_name == 'pull_request'
    name: Docker Build Check (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  publish:
    if: github.event_name != 'pull_request'
    name: Publish Container (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        shell: bash
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${{ env.REGISTRY }}/${owner}/${repo}-${{ matrix.app }}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (main)
        id: meta-main
        if: github.ref == 'refs/heads/main'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=develop
            type=sha

      - name: Determine whether tag should publish latest
        id: tag_rank
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          git fetch --tags --force

          current_tag="${GITHUB_REF_NAME}"
          latest_stable_tag="$(git tag -l 'v*' | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/' | sort -V | tail -n1)"

          if [ -n "$latest_stable_tag" ] && [ "$current_tag" = "$latest_stable_tag" ]; then
            echo "publish_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata (tag)
        id: meta-tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ steps.tag_rank.outputs.publish_latest == 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          labels: ${{ steps.meta-main.outputs.labels || steps.meta-tag.outputs.labels }}
          tags: ${{ steps.meta-main.outputs.tags || steps.meta-tag.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
