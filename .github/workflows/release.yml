name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

